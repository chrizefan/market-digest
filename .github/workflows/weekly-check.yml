name: Weekly Rollup Reminder

# Reminder only: canonical weekly rollups live in Supabase (`documents`), not in git.
# `outputs/` is gitignored — do not rely on a tracked filesystem artifact in CI.

on:
  schedule:
    - cron: '0 16 * * 5'
  workflow_dispatch:

jobs:
  weekly-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Reminder
        run: |
          echo "Weekly rollup (Supabase): author weekly_digest JSON (templates/schemas/weekly-digest.schema.json),"
          echo "validate (validate_artifact.py -) and publish_document.py --payload - with document_key weekly/YYYY-Www.json."
          echo "See RUNBOOK.md and scripts/weekly-rollup.sh (prints operator prompt)."
