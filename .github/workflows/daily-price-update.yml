name: Daily Price Update

# Runs each trading day at 9:30 PM ET (1:30 AM UTC next day) — ~3 hours after NYSE close.
# This ensures all same-day OHLCV data is settled before upsert.
# Manual trigger also available for backfills or reruns.
on:
  schedule:
    - cron: "30 1 * * 2-6"   # Tue–Sat UTC = Mon–Fri after US market close
  workflow_dispatch:
    inputs:
      period:
        description: "yfinance period (e.g. 1d, 5d, 1mo, 2y)"
        required: false
        default: "5d"
      ticker:
        description: "Single ticker to update (leave blank for full watchlist)"
        required: false
        default: ""

jobs:
  update-prices:
    name: Fetch & Upsert Price History
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Scheduled run: refresh any tickers with stale cache (>1 day)
      - name: Refresh stale tickers (scheduled)
        if: github.event_name == 'schedule'
        run: |
          python3 scripts/preload-history.py \
            --refresh \
            --max-stale-days 1 \
            --supabase

      # Manual run: respect workflow_dispatch inputs
      - name: Update prices (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          ARGS="--supabase --period ${{ github.event.inputs.period }}"
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            ARGS="$ARGS --ticker ${{ github.event.inputs.ticker }}"
          else
            ARGS="$ARGS --refresh --max-stale-days 1"
          fi
          python3 scripts/preload-history.py $ARGS

      # After prices are up-to-date, recompute TA indicators for last 2 days
      # (2 days covers the new row + recalculates any indicators that depend on
      # prior values like MACD histogram cross detection)
      - name: Compute TA indicators (scheduled)
        if: github.event_name == 'schedule'
        run: |
          python3 scripts/compute-technicals.py \
            --days 2 \
            --supabase

      - name: Compute TA indicators (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TICKER_ARG=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            TICKER_ARG="--ticker ${{ github.event.inputs.ticker }}"
          fi
          python3 scripts/compute-technicals.py \
            --days 30 \
            --supabase \
            $TICKER_ARG

      - name: Verify row counts
        run: |
          python3 - <<'EOF'
          import os
          from supabase import create_client
          sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          ph = sb.table("price_history").select("ticker", count="exact").execute()
          pt = sb.table("price_technicals").select("ticker", count="exact").execute()
          print(f"✅ price_history:    {ph.count} rows")
          print(f"✅ price_technicals: {pt.count} rows")
          EOF
