name: Daily Price Update

# Runs each trading day at 6:00 PM ET (22:00 UTC) — ~2 hours after NYSE close.
# This ensures all same-day OHLCV data is settled before upsert, and the full
# indicator table is ready for the next morning's digest run.
# Manual trigger also available for backfills or reruns.
on:
  schedule:
    - cron: "0 22 * * 1-5"   # Mon–Fri 22:00 UTC = 6:00 PM ET (≈2h after NYSE close)
  workflow_dispatch:
    inputs:
      period:
        description: >
          yfinance lookback for each download (1mo, 2y, 5y, max). This is how far back
          Yahoo data is fetched for tickers being updated — not “only update 5 days in Supabase”.
          Use 2y for normal runs (matches script default). Use max or 5y after long outages.
        required: false
        default: "2y"
      ticker:
        description: "Optional: one ticker only (e.g. GLD). Leave blank for full watchlist + same logic as schedule."
        required: false
        default: ""

jobs:
  update-prices:
    name: Fetch & Upsert Price History
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Scheduled run: refresh any tickers with stale cache (>1 day)
      - name: Refresh stale tickers (scheduled)
        if: github.event_name == 'schedule'
        run: |
          python3 scripts/preload-history.py \
            --refresh \
            --max-stale-days 1 \
            --supabase

      # Manual run: same strategy as schedule when ticker is blank (refresh stale tickers);
      # period defaults to 2y so we do not truncate history to a short window (unlike old 5d default).
      - name: Update prices (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          PERIOD="${{ github.event.inputs.period }}"
          ARGS="--supabase"
          if [ -n "$PERIOD" ]; then
            ARGS="$ARGS --period $PERIOD"
          fi
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            ARGS="$ARGS --ticker ${{ github.event.inputs.ticker }}"
          else
            ARGS="$ARGS --refresh --max-stale-days 1"
          fi
          python3 scripts/preload-history.py $ARGS

      # After prices are up-to-date, recompute TA indicators for last 7 days.
      # 7 days covers: Mon catching up Fri's row, rolling indicators that depend
      # on prior values (MACD histogram, Stochastic), and any weekend data gaps.
      - name: Compute TA indicators (scheduled)
        if: github.event_name == 'schedule'
        run: |
          python3 scripts/compute-technicals.py \
            --days 7 \
            --supabase

      - name: Compute TA indicators (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TICKER_ARG=""
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            TICKER_ARG="--ticker ${{ github.event.inputs.ticker }}"
          fi
          python3 scripts/compute-technicals.py \
            --days 30 \
            --supabase \
            $TICKER_ARG

      # Carry-forward positions + portfolio_metrics for each calendar day through today (UTC)
      # so timelines stay dense when no digest ran (see RUNBOOK — daily portfolio continuity).
      - name: Refresh position, NAV & portfolio_metrics (calendar fill)
        run: |
          python3 scripts/refresh_performance_metrics.py --supabase --fill-calendar-through "$(date -u +%Y-%m-%d)"

      - name: Verify row counts
        run: |
          python3 - <<'EOF'
          import os
          from supabase import create_client
          sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_SERVICE_KEY"])
          ph = sb.table("price_history").select("ticker", count="exact").execute()
          pt = sb.table("price_technicals").select("ticker", count="exact").execute()
          print(f"✅ price_history:    {ph.count} rows")
          print(f"✅ price_technicals: {pt.count} rows")
          EOF
