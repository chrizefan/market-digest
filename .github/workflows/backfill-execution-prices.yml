# Optional: fill position_events.price after pre-market runs left nulls.
# Trigger manually once opens exist in price_history for the run date.

name: Backfill execution open prices

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Trading date YYYY-MM-DD"
        required: true
        type: string

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python3 scripts/backfill_execution_prices.py --date "${{ github.event.inputs.date }}"
